name: Release

# Triggered by pushing a tag like v0.2.0 / v1.0.0-rc1 etc.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # to create the GitHub Release and upload assets

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: pq-aarch64-apple-darwin.tar.gz
            use_cross: false
            ext: ""
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: pq-x86_64-apple-darwin.tar.gz
            use_cross: false
            ext: ""
          # musl statically links libc → single binary that runs on every Linux.
          # DuckDB's bundled C++ build needs a real C++ cross-toolchain, which
          # ubuntu's musl-tools doesn't provide; cross-rs ships one in a Docker
          # image, so we use it for this target only.
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: pq-x86_64-unknown-linux-musl.tar.gz
            use_cross: true
            ext: ""
          # Windows: native MSVC toolchain on the windows-latest runner. We
          # ship a .zip (Windows users expect that) and a .exe binary.
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: pq-x86_64-pc-windows-msvc.zip
            use_cross: false
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}

      - name: Install cross (musl only)
        if: matrix.use_cross == true
        run: cargo install cross --locked --version 0.2.5

      - name: Build release binary (cargo)
        if: matrix.use_cross != true
        run: cargo build --release --target ${{ matrix.target }} --locked

      - name: Build release binary (cross)
        if: matrix.use_cross == true
        run: cross build --release --target ${{ matrix.target }} --locked

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cd target/${{ matrix.target }}/release
          # Strip and tarball — keeps assets ~10 MB instead of ~30 MB.
          strip pq || true
          tar -czf "../../../dist/${{ matrix.artifact }}" pq
          cd -
          # SHA256 sidecar for users who care about supply chain integrity.
          (cd dist && shasum -a 256 "${{ matrix.artifact }}" > "${{ matrix.artifact }}.sha256")
          ls -la dist/

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $bin = "target\${{ matrix.target }}\release\pq.exe"
          Compress-Archive -Path $bin -DestinationPath "dist\${{ matrix.artifact }}" -Force
          $hash = (Get-FileHash "dist\${{ matrix.artifact }}" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.artifact }}" | Out-File -Encoding ASCII "dist\${{ matrix.artifact }}.sha256"
          Get-ChildItem dist

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}
            dist/${{ matrix.artifact }}.sha256
          if-no-files-found: error

  release:
    name: release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List collected assets
        run: ls -la dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true

  # Bump the Homebrew formula in thehwang/homebrew-parq to point at this
  # tag's URLs+sha256s. Runs after `release` so the assets exist when we
  # fetch their .sha256 sidecars. Requires a HOMEBREW_TAP_GITHUB_TOKEN
  # secret with write access to the tap repo (a fine-grained PAT scoped
  # to thehwang/homebrew-parq with contents:write is enough).
  #
  # We regenerate the whole formula from a heredoc rather than using a
  # third-party action because our formula has 3 platform stanzas
  # (macOS arm/intel + linux x86_64) — most "bump formula" actions
  # assume a single download-url and don't handle multi-platform.
  homebrew-bump:
    name: bump homebrew formula
    needs: release
    runs-on: ubuntu-latest
    # Skip pre-release tags (anything containing `-`, e.g. v1.0.0-rc1)
    # so beta builds don't ship to brew users.
    if: ${{ !contains(github.ref_name, '-') }}
    steps:
      - name: Bump pq.rb in homebrew-parq
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Fail fast with a readable message if the PAT secret was never
          # configured (one-time setup — see the workflow comment above).
          # GitHub Actions can't gate `if:` on secrets, so the runtime
          # check is the cleanest way to surface "you need to add the
          # secret" instead of a cryptic git push 403.
          if [ -z "${HOMEBREW_TAP_GITHUB_TOKEN:-}" ]; then
            echo "::warning::HOMEBREW_TAP_GITHUB_TOKEN not set — skipping brew bump."
            echo "::warning::To enable: gh secret set HOMEBREW_TAP_GITHUB_TOKEN -R thehwang/parq"
            exit 0
          fi
          VERSION="${TAG#v}"
          BASE="https://github.com/thehwang/parq/releases/download/${TAG}"

          # Pull each platform's .sha256 sidecar from the release we
          # just published. The `awk` trims any trailing filename so
          # we keep just the hex digest.
          fetch_sha() {
            curl -fsSL "${BASE}/$1.sha256" | awk '{print $1}'
          }
          SHA_DARWIN_ARM=$(fetch_sha pq-aarch64-apple-darwin.tar.gz)
          SHA_DARWIN_X86=$(fetch_sha pq-x86_64-apple-darwin.tar.gz)
          SHA_LINUX=$(fetch_sha pq-x86_64-unknown-linux-musl.tar.gz)

          # Clone the tap with the PAT, regen the formula in place,
          # and push directly to main. The tap is single-formula and
          # we trust release.yml — no PR review hop.
          git clone --depth 1 \
            "https://x-access-token:${HOMEBREW_TAP_GITHUB_TOKEN}@github.com/thehwang/homebrew-parq.git" tap
          cd tap

          cat > Formula/pq.rb <<EOF
          class Pq < Formula
            desc "jq for Parquet — query parquet files with concise expression syntax"
            homepage "https://github.com/thehwang/parq"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "${BASE}/pq-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_DARWIN_ARM}"
              end
              on_intel do
                url "${BASE}/pq-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_DARWIN_X86}"
              end
            end

            on_linux do
              on_intel do
                url "${BASE}/pq-x86_64-unknown-linux-musl.tar.gz"
                sha256 "${SHA_LINUX}"
              end
            end

            def install
              bin.install "pq"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/pq --version")
            end
          end
          EOF

          git config user.email "actions@github.com"
          git config user.name "github-actions[bot]"
          git add Formula/pq.rb
          # Skip if the formula didn't actually change (e.g. someone
          # re-tagged the same SHA) — keeps the tap history clean.
          if git diff --staged --quiet; then
            echo "formula already at ${VERSION}; nothing to commit"
            exit 0
          fi
          git commit -m "pq ${VERSION}"
          git push origin main

name: Release

# Triggered by pushing a tag like v0.2.0 / v1.0.0-rc1 etc.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # to create the GitHub Release and upload assets

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: pq-aarch64-apple-darwin.tar.gz
            use_cross: false
            ext: ""
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: pq-x86_64-apple-darwin.tar.gz
            use_cross: false
            ext: ""
          # musl statically links libc → single binary that runs on every Linux.
          # DuckDB's bundled C++ build needs a real C++ cross-toolchain, which
          # ubuntu's musl-tools doesn't provide; cross-rs ships one in a Docker
          # image, so we use it for this target only.
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: pq-x86_64-unknown-linux-musl.tar.gz
            use_cross: true
            ext: ""
          # Windows: native MSVC toolchain on the windows-latest runner. We
          # ship a .zip (Windows users expect that) and a .exe binary.
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: pq-x86_64-pc-windows-msvc.zip
            use_cross: false
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}

      - name: Install cross (musl only)
        if: matrix.use_cross == true
        run: cargo install cross --locked --version 0.2.5

      - name: Build release binary (cargo)
        if: matrix.use_cross != true
        run: cargo build --release --target ${{ matrix.target }} --locked

      - name: Build release binary (cross)
        if: matrix.use_cross == true
        run: cross build --release --target ${{ matrix.target }} --locked

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cd target/${{ matrix.target }}/release
          # Strip and tarball — keeps assets ~10 MB instead of ~30 MB.
          strip pq || true
          tar -czf "../../../dist/${{ matrix.artifact }}" pq
          cd -
          # SHA256 sidecar for users who care about supply chain integrity.
          (cd dist && shasum -a 256 "${{ matrix.artifact }}" > "${{ matrix.artifact }}.sha256")
          ls -la dist/

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $bin = "target\${{ matrix.target }}\release\pq.exe"
          Compress-Archive -Path $bin -DestinationPath "dist\${{ matrix.artifact }}" -Force
          $hash = (Get-FileHash "dist\${{ matrix.artifact }}" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.artifact }}" | Out-File -Encoding ASCII "dist\${{ matrix.artifact }}.sha256"
          Get-ChildItem dist

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}
            dist/${{ matrix.artifact }}.sha256
          if-no-files-found: error

  release:
    name: release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List collected assets
        run: ls -la dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: pq-${{ matrix.os }}
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: test
        run: cargo test --release

  # v0.8: smoke-test the TUI by running the VHS tape against a real
  # release binary in a headless PTY. We don't keep the GIF — the only
  # signal we want is "did pq tui survive the scripted walkthrough
  # without panicking?". Catches focus/redraw/teardown bugs that the
  # in-process snapshot tests don't see (those exercise `render` but
  # not the event loop). Linux-only because vhs's Docker action is
  # x86_64-linux specific.
  tui-smoke:
    name: tui smoke (vhs)
    runs-on: ubuntu-latest
    needs: test
    # The smoke test depends on third-party tooling (vhs, ttyd, ffmpeg)
    # that occasionally hiccups in CI. Don't block PRs on it — the
    # in-process snapshot tests are the load-bearing TUI guard. This job
    # is pure belt-and-suspenders: catches event-loop / focus /
    # teardown bugs the snapshots miss.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: pq-ubuntu-latest
      - name: build release binary
        run: cargo build --release
      - name: generate sample.parquet
        # The tape does `pq tui sample.parquet`; ensure the file exists
        # in the workspace root. scripts/make_sample.py needs
        # pandas + pyarrow (CI-cached via pip).
        run: |
          python3 -m pip install --quiet pandas pyarrow
          python3 scripts/make_sample.py
      - name: install vhs + deps
        # Install vhs from its prebuilt .deb so apt resolves ffmpeg
        # and ttyd as declared package dependencies — avoids the
        # "Error: Failed to install ffmpeg" crash that hit us when
        # the manual apt-get path stripped recommended deps. Pinned
        # to a known-good vhs release; bump VHS_VERSION below.
        env:
          VHS_VERSION: v0.11.0
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/charmbracelet/vhs/releases/download/${VHS_VERSION}/vhs_${VHS_VERSION#v}_amd64.deb" \
            -o /tmp/vhs.deb
          sudo apt-get update -qq
          # ttyd is a runtime dep of vhs but the .deb on noble doesn't
          # auto-resolve it; install explicitly. ffmpeg comes through
          # the .deb's transitive deps fine.
          sudo apt-get install -y ttyd
          if ! command -v ttyd >/dev/null 2>&1; then
            # Fallback: noble universe may not have ttyd; pull the
            # upstream prebuilt binary.
            sudo curl -fsSL https://github.com/tsl0922/ttyd/releases/latest/download/ttyd.x86_64 \
              -o /usr/local/bin/ttyd
            sudo chmod +x /usr/local/bin/ttyd
          fi
          sudo apt-get install -y /tmp/vhs.deb
          vhs --version
          ffmpeg -version | head -1
          ttyd --version
      - name: run vhs
        # Don't keep the gif — this is a smoke test, not a release
        # asset bake. The vhs run only signals success vs panic.
        run: vhs assets/tui.tape

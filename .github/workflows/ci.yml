name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: pq-${{ matrix.os }}
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: test
        run: cargo test --release

  # v0.8: smoke-test the TUI by running the VHS tape against a real
  # release binary in a headless PTY. We don't keep the GIF — the only
  # signal we want is "did pq tui survive the scripted walkthrough
  # without panicking?". Catches focus/redraw/teardown bugs that the
  # in-process snapshot tests don't see (those exercise `render` but
  # not the event loop). Linux-only because vhs's Docker action is
  # x86_64-linux specific.
  tui-smoke:
    name: tui smoke (vhs)
    runs-on: ubuntu-latest
    needs: test
    # The smoke test depends on third-party tooling (vhs, ttyd, ffmpeg)
    # that occasionally hiccups in CI. Don't block PRs on it — the
    # in-process snapshot tests are the load-bearing TUI guard. This job
    # is pure belt-and-suspenders: catches event-loop / focus /
    # teardown bugs the snapshots miss.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: pq-ubuntu-latest
      - name: build release binary
        run: cargo build --release
      - name: generate sample.parquet
        # The tape does `pq tui sample.parquet`; ensure the file exists
        # in the workspace root. scripts/make_sample.py needs
        # pandas + pyarrow (CI-cached via pip).
        run: |
          python3 -m pip install --quiet pandas pyarrow
          python3 scripts/make_sample.py
      - name: install vhs + deps
        # We vendor the install (go install + apt deps) instead of using
        # the charmbracelet/vhs-action so we're not at the mercy of that
        # action's tag policy. Pinned to a known-good vhs release; bump
        # by editing VHS_VERSION below.
        env:
          VHS_VERSION: v0.8.0
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ttyd ffmpeg
          # Prebuilt linux/amd64 binary — avoids needing a Go toolchain
          # in CI just to compile vhs.
          curl -fsSL "https://github.com/charmbracelet/vhs/releases/download/${VHS_VERSION}/vhs_${VHS_VERSION#v}_Linux_x86_64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin vhs
          vhs --version
      - name: run vhs
        run: vhs assets/tui.tape
